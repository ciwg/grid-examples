# Intent: Keep the copied Docker simulation on ex3's own ports so it can run
# beside ex2's compose stack, while using published ports instead of host
# networking so ex3 can demonstrate real remote clients. Source: DI-vatub;
# DI-povip
services:
  relay-a:
    build:
      context: .
      dockerfile: Dockerfile
    user: "0:0"
    command:
      - --listen
      - 0.0.0.0:7025
      - --data-root
      - /home/grid/data
      - --remote-access-token
      - ex3-demo-access
      - --peer
      - http://relay-b:7026
    ports:
      - "7025:7025"
    volumes:
      - relay-a-data:/home/grid/data
    restart: unless-stopped

  relay-b:
    build:
      context: .
      dockerfile: Dockerfile
    user: "0:0"
    command:
      - --listen
      - 0.0.0.0:7026
      - --data-root
      - /home/grid/data
      - --remote-access-token
      - ex3-demo-access
      - --peer
      - http://relay-a:7025
    ports:
      - "7026:7026"
    volumes:
      - relay-b-data:/home/grid/data
    restart: unless-stopped

volumes:
  relay-a-data:
  relay-b-data:
